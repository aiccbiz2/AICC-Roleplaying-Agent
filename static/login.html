<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | AI Roleplay Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
      animation: fadeIn 0.5s ease forwards;
    }

    /* Logo area */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: #1d1d1f;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .logo-icon .material-symbols-outlined {
      color: #fff;
      font-size: 28px;
    }
    .logo-title {
      font-size: 28px;
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.02em;
    }
    .logo-subtitle {
      font-size: 14px;
      color: #86868b;
      margin-top: 4px;
    }

    /* Card */
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }
    .login-card h2 {
      font-size: 20px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 24px;
    }

    /* Error */
    .error-msg {
      display: none;
      padding: 10px 14px;
      background: #fff2f2;
      border: 1px solid #ffd6d6;
      border-radius: 12px;
      font-size: 13px;
      color: #d70015;
      margin-bottom: 16px;
      align-items: center;
      gap: 8px;
    }
    .error-msg.show { display: flex; }
    .error-msg .material-symbols-outlined { font-size: 18px; color: #d70015; }

    /* Form */
    .field { margin-bottom: 16px; }
    .field:last-of-type { margin-bottom: 24px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #86868b;
      margin-bottom: 6px;
    }
    .field .input-wrap {
      position: relative;
    }
    .field .input-wrap .material-symbols-outlined {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #aeaeb2;
    }
    .field input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      font-size: 15px;
      font-family: inherit;
      color: #1d1d1f;
      background: #f5f5f7;
      border: 1.5px solid transparent;
      border-radius: 12px;
      outline: none;
      transition: all 0.2s ease;
    }
    .field input::placeholder {
      color: #aeaeb2;
    }
    .field input:focus {
      background: #fff;
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.12);
    }

    /* Button */
    .login-btn {
      width: 100%;
      padding: 13px 0;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: #0071e3;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    .login-btn:hover {
      background: #0077ed;
    }
    .login-btn:active {
      transform: scale(0.98);
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .login-btn .material-symbols-outlined {
      font-size: 18px;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #aeaeb2;
      margin-top: 24px;
    }

    /* Spin animation */
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">
        <span class="material-symbols-outlined">smart_toy</span>
      </div>
      <div class="logo-title">AI Roleplay Agent</div>
      <div class="logo-subtitle">AI사업2팀 자기학습 도구</div>
    </div>

    <!-- Card -->
    <div class="login-card">
      <h2>로그인</h2>

      <!-- Error -->
      <div id="error-msg" class="error-msg">
        <span class="material-symbols-outlined">error</span>
        <span id="error-text"></span>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label for="user-id">아이디</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined">person</span>
            <input type="text" id="user-id" required autocomplete="username" placeholder="아이디를 입력하세요" />
          </div>
        </div>

        <div class="field">
          <label for="user-pw">비밀번호</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined">lock</span>
            <input type="password" id="user-pw" required autocomplete="current-password" placeholder="비밀번호를 입력하세요" />
          </div>
        </div>

        <button type="submit" id="login-btn" class="login-btn">
          <span class="material-symbols-outlined">login</span>
          로그인
        </button>
      </form>
    </div>

    <div class="footer">v2.0 · Powered by Claude · LG U+ AI사업2팀</div>
  </div>

  <script>
    // 이미 로그인 상태면 대시보드로 이동
    (async function checkExistingToken() {
      const form = document.getElementById('login-form');
      form.style.opacity = '0.5';
      form.querySelector('button[type="submit"]').disabled = true;

      const token = localStorage.getItem('token');
      if (!token) { form.style.opacity = '1'; form.querySelector('button[type="submit"]').disabled = false; return; }
      try {
        const res = await fetch('/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (res.ok) {
          window.location.href = '/';
          return;
        } else {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
        }
      } catch (e) {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
      }
      form.style.opacity = '1';
      form.querySelector('button[type="submit"]').disabled = false;
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorDiv = document.getElementById('error-msg');
      const errorText = document.getElementById('error-text');

      const userId = document.getElementById('user-id').value.trim();
      const userPw = document.getElementById('user-pw').value;

      if (!userId || !userPw) return;

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size:18px">progress_activity</span> 로그인 중...';
      errorDiv.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: userId, password: userPw }),
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          let message = '로그인에 실패했습니다.';
          try {
            const err = await res.json();
            message = err.detail || message;
          } catch (_) {}
          errorText.textContent = message;
          errorDiv.classList.add('show');
        }
      } catch (err) {
        errorText.textContent = '서버에 연결할 수 없습니다.';
        errorDiv.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px">login</span> 로그인';
      }
    }
  </script>
</body>
</html>
