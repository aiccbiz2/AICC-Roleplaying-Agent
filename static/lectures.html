<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lectures | AI Roleplay Agent</title>
  <link rel="stylesheet" href="/static/shared.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1d1d1f',
            secondary: '#6e6e73',
            'secondary-fixed': '#f5f5f7',
            surface: '#fbfbfd',
            'surface-container-low': '#f5f5f7',
            'on-surface': '#1d1d1f',
            'on-surface-variant': '#6e6e73',
            outline: '#86868b',
            'outline-variant': '#d2d2d7',
          },
          fontFamily: {
            headline: ['Manrope', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Manrope', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    /* ── Card Grid ── */
    .lecture-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .lecture-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        box-shadow 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .lecture-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }

    .lecture-card__banner {
      height: 200px;
      position: relative;
      overflow: hidden;
      background: #1d1d1f;
    }

    .lecture-card__banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .lecture-card__banner--no-img {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f7;
    }

    .lecture-card__banner--no-img .lecture-card__banner-icon {
      font-size: 56px;
      color: #d2d2d7;
    }

    .lecture-card__badge {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 4px 12px;
      border-radius: 980px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
    }

    .lecture-card__body {
      padding: 24px;
    }

    .lecture-card__title {
      font-family: 'Manrope', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #1d1d1f;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .lecture-card__desc {
      font-size: 14px;
      color: #6e6e73;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .lecture-card__meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: #86868b;
    }

    .lecture-card__meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lecture-card__meta-item .material-symbols-outlined {
      font-size: 16px;
    }

    /* ── Detail View ── */
    .detail-view {
      display: none;
    }

    .detail-view.active {
      display: block;
    }

    .list-view.hidden {
      display: none;
    }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      font-weight: 500;
      color: #1d1d1f;
      cursor: pointer;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .detail-back:hover {
      color: #434751;
    }

    .detail-back .material-symbols-outlined {
      font-size: 18px;
    }

    .detail-header {
      margin-bottom: 40px;
    }

    .detail-header__badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 980px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
    }

    .detail-header__title {
      font-family: 'Manrope', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #1d1d1f;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .detail-header__subtitle {
      font-size: 16px;
      color: #6e6e73;
      line-height: 1.5;
    }

    /* ── Article Content ── */
    .article-content {
      max-width: 800px;
    }

    .article-content h2 {
      font-family: 'Manrope', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #1d1d1f;
      margin: 48px 0 16px 0;
      padding-bottom: 12px;
      border-bottom: 2px solid #f5f5f7;
    }

    .article-content h3 {
      font-family: 'Manrope', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #1d1d1f;
      margin: 32px 0 12px 0;
    }

    .article-content h4 {
      font-size: 15px;
      font-weight: 600;
      color: #424245;
      margin: 24px 0 8px 0;
    }

    .article-content p {
      font-size: 15px;
      color: #424245;
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .article-content ul,
    .article-content ol {
      margin: 12px 0 20px 0;
      padding-left: 24px;
    }

    .article-content li {
      font-size: 15px;
      color: #424245;
      line-height: 1.8;
      margin-bottom: 6px;
    }

    .article-content strong {
      color: #1d1d1f;
      font-weight: 600;
    }

    .article-content blockquote {
      border-left: 3px solid #0071e3;
      padding: 12px 20px;
      margin: 20px 0;
      background: #f5f5f7;
      border-radius: 0 12px 12px 0;
      font-size: 15px;
      color: #424245;
    }

    .article-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
      border-radius: 12px;
      overflow: hidden;
    }

    .article-content thead th {
      background: #1d1d1f;
      color: #fff;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
    }

    .article-content tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid #f5f5f7;
      color: #424245;
    }

    .article-content tbody tr:last-child td {
      border-bottom: none;
    }

    .article-content tbody tr:nth-child(even) {
      background: #fafafa;
    }

    .article-content pre {
      background: #1d1d1f;
      color: #e5e5ea;
      padding: 20px 24px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.7;
      margin: 20px 0;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .article-content code {
      background: #f5f5f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: #e3004a;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .article-content pre code {
      background: none;
      color: inherit;
      padding: 0;
    }

    /* ── Checklist ── */
    .checklist {
      background: #f5f5f7;
      border-radius: 16px;
      padding: 24px 28px;
      margin: 32px 0;
    }

    .checklist h4 {
      margin-top: 0 !important;
      margin-bottom: 16px !important;
    }

    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      font-size: 14px;
      color: #424245;
    }

    .checklist-item .material-symbols-outlined {
      font-size: 20px;
      color: #86868b;
      flex-shrink: 0;
      margin-top: 1px;
    }
  </style>
</head>

    <p class="ex-body">우리가 흔히 "콜센터"라고 부르는 그 시스템의 정식 이름은 <span class="ex-strong">IPCC(Internet Protocol Contact Center)</span>입니다. IP 네트워크 위에서 전화와 고객 데이터를 함께 처리하는 차세대 컨택센터죠. 이 강의는 그 안을 차근차근 열어 봅니다.</p>

  <section class="ex-section ex-section--light">
    <p class="ex-eyebrow">Chapter 1 · 개요</p>

    <p class="ex-body">IPCC를 한 줄로 정의하면 이렇습니다. <span class="ex-strong">인터넷 프로토콜(IP) 기반으로 전화·채팅·이메일 등 모든 고객 접점을 통합 관리하는 시스템.</span> 풀어 쓰면, 과거 교환기로 대표되는 아날로그 콜센터와 달리, 음성 통화와 고객 데이터를 같은 네트워크에서 함께 처리한다는 뜻입니다.</p>

    <p class="ex-body">왜 이게 중요할까요? 기존 콜센터는 "전화선"과 "고객 정보 시스템"이 완전히 따로 놀았습니다. 상담원은 전화를 받자마자 "고객님 성함이 어떻게 되시죠? 주민번호 뒷자리는요?"부터 묻고 시작해야 했죠. IPCC가 바뀐 점은 단순합니다. <span class="ex-strong">전화가 연결되는 그 순간, 누가 거는지, 어떤 계약이 있는지, 지난번 민원이 무엇이었는지를 상담원 화면에 자동으로 띄워 줍니다.</span></p>

    <h4 class="ex-h-sub">기존 콜센터(TDM) vs IPCC, 무엇이 달라졌나</h4>
    <div class="ex-grid-2" style="margin-top: 24px;">
      <div class="ex-card">
        <p class="ex-eyebrow">기존 · TDM</p>

        <ul class="ex-list" style="margin-top: 12px;">
          <li>아날로그·디지털 전용 회선 사용</li>
          <li>전화와 데이터가 완전히 분리</li>
          <li>고객 정보를 상담원이 직접 묻고 입력</li>
          <li>확장·변경 시 물리적 공사 필수</li>
        </ul>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">차세대 · IPCC</p>
        <h4 class="ex-h-card">하나의 IP 망에서 전부 처리</h4>
        <ul class="ex-list" style="margin-top: 12px;">
          <li>IP 네트워크로 음성·데이터 통합</li>
          <li>전화 연결과 동시에 고객 정보 팝업</li>
          <li>지능형 라우팅으로 최적 상담원 연결</li>
          <li>소프트웨어 설정만으로 유연하게 확장</li>
        </ul>
      </div>
    </div>

    <div class="ex-callout">
      <p class="ex-callout__label">한 문장으로</p>
      <p class="ex-callout__text">IPCC의 본질은 <span class="ex-strong">"전화"와 "데이터"의 동시 처리</span>입니다. 전화벨이 울리는 그 순간, 상담원 모니터에 고객의 계좌·보험·민원 이력이 함께 뜨는 것 — 그게 핵심입니다.</p>

  <section class="ex-section ex-section--white">
    <p class="ex-eyebrow">Chapter 2 · 핵심 개념</p>
    <h3 class="ex-h-section">IP 전화라고 다 IPCC가 아닙니다.</h3>

    <p class="ex-body">현장에서 가장 자주 보는 혼동이 있습니다. "우리 회사는 인터넷 전화 깔았으니까 IPCC 하는 거 아닌가요?" 결론부터 말씀드리면, <span class="ex-strong">아닙니다.</span> 인터넷으로 음성을 주고받는 것과, 그 음성을 고객 데이터와 연결해 지능적으로 처리하는 것은 완전히 다른 차원의 이야기입니다.</p>

    <p class="ex-body">이 차이를 가르는 두 약어가 <span class="ex-strong">IPT(IP Telephony)</span>와 <span class="ex-strong">IPCC(IP Contact Center)</span>입니다.</p>

    <div class="ex-grid-2" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">IPT · Internet Protocol Telephony</p>
        <h4 class="ex-h-card">"IP 기반 전화기" — 그 이상도 이하도 아님</h4>
        <p class="ex-caption" style="margin-top: 12px;">카카오톡 음성통화를 떠올리면 정확합니다. IP 망을 통해 음성을 전달할 뿐, 고객 정보 연동이나 지능형 라우팅은 없습니다.</p>
        <ul class="ex-list" style="margin-top: 12px;">

      </div>
      <div class="ex-card">

        <h4 class="ex-h-card">"IP 기반 전화기 + 두뇌"</h4>
        <p class="ex-caption" style="margin-top: 12px;">IPT 위에 CTI 미들웨어를 얹어 고객 정보와 통화를 실시간으로 연동합니다. "이 전화는 VIP 고객이니 전담 상담원에게" 같은 지능이 생깁니다.</p>
        <ul class="ex-list" style="margin-top: 12px;">
          <li>고객 정보 실시간 조회·팝업</li>
          <li>스킬 기반 자동 라우팅</li>
          <li>IVR·녹취·통계 완전 통합</li>
        </ul>
      </div>
    </div>

    <p class="ex-pullquote">"IPCC = IPT + CTI 미들웨어. CTI가 없으면 IPCC가 아니다."</p>

    <p class="ex-body ex-body--muted">이 한 문장이 강의 전체를 관통하는 핵심입니다. 뒤에서 CTI를 다룰 때 다시 한 번 등장합니다. 일단 머릿속에 새겨 두세요.</p>

  <section class="ex-section ex-section--light">

    <h3 class="ex-h-section">E1 한 회선이면, 30명이 동시에 통화합니다.</h3>

    <p class="ex-body">IPCC 인프라 견적을 처음 보는 분이 가장 먼저 만나는 숫자가 <span class="ex-strong">"E1 몇 회선"</span>입니다. 이 숫자가 무엇을 의미하는지 알면, 그 컨택센터가 얼마나 큰 규모인지를 한눈에 가늠할 수 있습니다.</p>

    <h4 class="ex-h-sub">E1/PRI · 통신사가 깔아주는 디지털 회선</h4>
    <p class="ex-body">E1/PRI는 유럽 표준 디지털 전송 방식입니다. KT, SKT 같은 통신사에서 기업 교환기까지 연결되는 물리적 회선이라고 보면 됩니다. 이 회선의 스펙은 정해져 있습니다.</p>

      <div class="ex-chain__node">IP 패킷</div>
    </div>

    <p class="ex-body">이 장비가 없으면 IP 네트워크에서 음성을 처리할 방법이 없습니다. 대표 벤더는 <span class="ex-strong">시스코 ASR</span>과 <span class="ex-strong">Audiocodes</span>입니다. 견적서에 이 두 이름이 자주 보이는 이유입니다.</p>
  </section>

  <!-- SECTION 5: PBX -->
  <section class="ex-section ex-section--white">
    <p class="ex-eyebrow">Chapter 5 · 교환기</p>
    <h3 class="ex-h-section">PBX는 컨택센터의 교통경찰입니다.</h3>

    <p class="ex-body">PBX(Private Branch Exchange)는 한마디로 <span class="ex-strong">기업 내 전화 교환을 담당하는 장비</span>입니다. 옛날 영화에서 교환수가 코드를 꽂아 전화를 연결하던 모습을 떠올리면 비슷합니다. 그 역할을 자동화한 것이 PBX, 그리고 그것을 IP 기반 소프트웨어로 만든 것이 IPCC에서 쓰는 <span class="ex-strong">IP-PBX</span>입니다.</p>

    <p class="ex-body">PBX가 어렵게 느껴지는 이유는 다섯 가지 번호 개념을 한꺼번에 다뤄야 하기 때문입니다. 하나씩 분리해서 보면 어렵지 않습니다.</p>

    <h4 class="ex-h-sub">PBX가 다루는 다섯 가지 번호 체계</h4>

    <div class="ex-grid-3" style="margin-top: 24px;">
      <div class="ex-card">
        <p class="ex-eyebrow">01 · 대표번호</p>
        <h4 class="ex-h-card">고객이 걸어오는 번호</h4>
        <p class="ex-caption" style="margin-top: 12px;">1588-XXXX 같은 번호. 외부에 노출되는 단 하나의 입구입니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">02 · 회선번호</p>
        <h4 class="ex-h-card">E1 채널에 붙은 식별자</h4>
        <p class="ex-caption" style="margin-top: 12px;">물리적 연결을 구분하기 위해 각 채널에 부여된 번호입니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">03 · 내선번호</p>
        <h4 class="ex-h-card">상담원 개인 번호</h4>
        <p class="ex-caption" style="margin-top: 12px;">3001, 3002 같은 번호. 누구에게 전화가 가야 할지를 결정합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">04 · IVR 포트</p>
        <h4 class="ex-h-card">자동응답이 점유하는 채널</h4>
        <p class="ex-caption" style="margin-top: 12px;">"1번 누르세요" 안내가 흐르는 동안 점유되는 가상 채널입니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">05 · 스킬 그룹</p>
        <h4 class="ex-h-card">동일 업무 상담원 묶음</h4>
        <p class="ex-caption" style="margin-top: 12px;">대출팀·보험팀처럼 같은 업무를 하는 상담원을 묶은 논리적 단위입니다.</p>
      </div>
      <div class="ex-card" style="background: #1d1d1f; color: #f5f5f7;">
        <p class="ex-eyebrow" style="color: #86868b;">PBX의 역할</p>
        <h4 class="ex-h-card" style="color: #f5f5f7;">이 모든 번호의 교통 정리</h4>
        <p class="ex-caption" style="margin-top: 12px; color: #a1a1a6;">대표번호로 들어온 전화를, 회선·IVR 포트·스킬 그룹·내선을 거쳐 올바른 자리로 보내줍니다.</p>
      </div>
    </div>

    <h4 class="ex-h-sub">동양생명 사례로 한 줄에 꿰어 보기</h4>
    <p class="ex-body">"고객이 1588 번호를 누르면 무슨 일이 일어나는지" 동양생명 환경에 맞춰 한 줄로 그려 봅니다. 5개의 번호 개념이 어떻게 차례로 호출되는지 보입니다.</p>

    <div class="ex-chain" style="margin: 24px 0;">
      <div class="ex-chain__node">1588-XXXX<br/><span style="font-weight:400; font-size:12px; color:#6e6e73;">대표번호</span></div>
      <div class="ex-chain__arrow">&rarr;</div>
      <div class="ex-chain__node">E1 회선<br/><span style="font-weight:400; font-size:12px; color:#6e6e73;">600채널 수신</span></div>
      <div class="ex-chain__arrow">&rarr;</div>
      <div class="ex-chain__node">IVR 포트<br/><span style="font-weight:400; font-size:12px; color:#6e6e73;">자동응답 처리</span></div>
      <div class="ex-chain__arrow">&rarr;</div>
      <div class="ex-chain__node">스킬 그룹<br/><span style="font-weight:400; font-size:12px; color:#6e6e73;">대출/보험팀</span></div>
      <div class="ex-chain__arrow">&rarr;</div>
      <div class="ex-chain__node ex-chain__node--dark">내선 3001<br/><span style="font-weight:400; font-size:12px; color:#a1a1a6;">상담원 연결</span></div>
    </div>
  </section>

  <!-- SECTION 6: CTI (DARK) -->
  <section class="ex-section ex-section--dark">
    <p class="ex-eyebrow">Chapter 6 · 미들웨어</p>
    <h3 class="ex-h-section">CTI가 없으면, IPCC가 아닙니다.</h3>
    <p class="ex-lead" style="max-width: 720px;">앞에서도 한 번 짚었지만, 다시 강조합니다. <span style="color:#fff; font-weight:600;">전화 시스템과 컴퓨터 시스템을 연결하는 미들웨어 — 그것이 CTI입니다.</span> 이 한 덩어리가 빠지면, 아무리 비싼 IP 전화기를 들여도 그저 IPT일 뿐입니다.</p>

    <p class="ex-pullquote" style="margin-top: 56px;">"CTI가 없으면 IPCC가 아니다."<br/>&mdash; 이 강의에서 가장 중요한 한 문장.</p>

    <h4 class="ex-h-sub" style="margin-top: 56px;">CTI가 실제로 하는 여섯 가지 일</h4>
    <p class="ex-body">CTI는 추상적인 개념이 아닙니다. 매우 구체적인 여섯 가지 일을 합니다. 견적서나 PRD에서 "CTI 라이센스" 항목이 보이면, 사실은 이 여섯 가지를 모두 사고 있는 것입니다.</p>

    <div class="ex-steplist">
      <div class="ex-steplist__item">
        <div class="ex-steplist__num">01</div>
        <div>
          <p class="ex-steplist__title">레지스터(Register)</p>
          <p class="ex-steplist__desc">상담원이 로그인하면 CTI에 자신의 상태를 등록합니다. "나는 지금 내선 3001번, 대출팀, 상담 가능 상태"라고 선언하는 것입니다.</p>
        </div>
      </div>
      <div class="ex-steplist__item">
        <div class="ex-steplist__num">02</div>
        <div>
          <p class="ex-steplist__title">이벤트 감시</p>
          <p class="ex-steplist__desc">PBX에서 발생하는 모든 전화 이벤트(착신·연결·종료·대기)를 실시간으로 감지합니다. 이벤트가 곧 CTI의 입력 신호입니다.</p>
        </div>
      </div>
      <div class="ex-steplist__item">
        <div class="ex-steplist__num">03</div>
        <div>
          <p class="ex-steplist__title">데이터 생성</p>
          <p class="ex-steplist__desc">전화 이벤트에 고객 정보(계좌·이름·민원 이력)를 매핑해 의미 있는 데이터를 만들어냅니다. 단순 전화 이벤트가 "고객 컨텍스트"로 바뀌는 순간입니다.</p>
        </div>
      </div>
      <div class="ex-steplist__item">
        <div class="ex-steplist__num">04</div>
        <div>
          <p class="ex-steplist__title">로그 관리</p>
          <p class="ex-steplist__desc">모든 통화 이벤트를 시간순으로 기록합니다. 분쟁이나 감사가 발생했을 때 가장 먼저 꺼내 보는 자료가 이 로그입니다.</p>
        </div>
      </div>
      <div class="ex-steplist__item">
        <div class="ex-steplist__num">05</div>
        <div>
          <p class="ex-steplist__title">통계 생성</p>
          <p class="ex-steplist__desc">인입량·응답률·대기시간·통화시간 같은 KPI 지표를 실시간 또는 일별로 집계합니다. 컨택센터 매니저가 매일 보는 그 대시보드의 데이터 소스입니다.</p>
        </div>
      </div>
      <div class="ex-steplist__item">
        <div class="ex-steplist__num">06</div>
        <div>
          <p class="ex-steplist__title">라우팅 지시</p>
          <p class="ex-steplist__desc">IVR이 수집한 고객 정보를 분석해 PBX에게 명령합니다. "이 고객은 VIP니 3번 스킬 그룹으로 연결하라" 같은 의사결정이 여기서 일어납니다.</p>
        </div>
      </div>
    </div>

    <hr class="ex-divider" style="margin-top: 48px;"/>

    <h4 class="ex-h-sub">현장에서 자주 헷갈리는 두 단어 · Register vs Connection</h4>
    <p class="ex-body">CTI를 처음 배우는 분이 거의 100% 헷갈리는 것이 <span style="color:#fff; font-weight:600;">레지스터(Register)</span>와 <span style="color:#fff; font-weight:600;">커넥션(Connection)</span>의 차이입니다. 한 번에 정리합니다.</p>

    <div class="ex-grid-2" style="margin-top: 24px;">
      <div class="ex-card">
        <p class="ex-eyebrow">Register</p>
        <h4 class="ex-h-card">"등록" — 출근 도장</h4>
        <p class="ex-caption" style="margin-top: 12px;">상담원이 업무 시작 전에 CTI에 자신의 상태를 선언하는 행위. 로그인 후 "나는 준비됨" 상태. 전화가 오기 전에 이루어집니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">Connection</p>
        <h4 class="ex-h-card">"연결" — 실제 통화 중</h4>
        <p class="ex-caption" style="margin-top: 12px;">실제 전화가 들어와서 상담원과 고객이 실시간으로 대화 중인 상태. PBX와 CTI가 함께 관리합니다.</p>
      </div>
    </div>
  </section>

  <!-- SECTION 7: IVR -->
  <section class="ex-section ex-section--light">
    <p class="ex-eyebrow">Chapter 7 · 자동응답</p>
    <h3 class="ex-h-section">ARS와 IVR은 닮았지만, 같지 않습니다.</h3>

    <p class="ex-body">둘 다 "자동응답"이라고 뭉뚱그려 부르지만, 실무에서 두 단어는 엄연히 다른 의미로 쓰입니다. 이 차이를 모르면 제안서에서 어색한 표현이 나옵니다. 간단히 구분하면 이렇습니다.</p>

    <div class="ex-grid-2" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">ARS · 자동응답</p>
        <h4 class="ex-h-card">일방향 음성 안내</h4>
        <p class="ex-caption" style="margin-top: 12px;">고객은 듣기만 합니다. 상호작용 없이 미리 녹음된 멘트를 그대로 재생하는 방식입니다.</p>
        <p class="ex-caption" style="margin-top: 12px; font-style: italic; color: #1d1d1f;">"영업시간은 오전 9시부터 오후 6시까지입니다. 감사합니다."</p>
        <p class="ex-caption" style="margin-top: 8px;">&rarr; 고객 입력 없음, 단순 안내만</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">IVR · 대화형 응답</p>
        <h4 class="ex-h-card">양방향 인터랙티브</h4>
        <p class="ex-caption" style="margin-top: 12px;">고객이 번호를 누르거나 말하면, 시스템이 반응하여 다음 단계로 분기합니다.</p>
        <p class="ex-caption" style="margin-top: 12px; font-style: italic; color: #1d1d1f;">"대출 상담은 1번, 보험 상담은 2번을 누르세요." &rarr; 1번 &rarr; 대출팀 분기</p>
        <p class="ex-caption" style="margin-top: 8px;">&rarr; 고객 입력을 받아 시나리오 분기</p>
      </div>
    </div>

    <h4 class="ex-h-sub">IVR이 실제로 하는 세 가지</h4>
    <p class="ex-body">IVR이라는 시스템을 뜯어 보면 결국 세 가지 동작으로 요약됩니다. 멘트를 들려주고, 고객 반응을 받아서 분기하고, 필요하면 뒤쪽 업무 시스템에서 데이터를 끌어오는 것. 이 세 가지가 자유롭게 조합되면서 복잡한 ARS 메뉴가 만들어집니다.</p>

    <div class="ex-steplist">
      <div class="ex-steplist__item">
        <div class="ex-steplist__num">01</div>
        <div>
          <p class="ex-steplist__title">멘트 플레이</p>
          <p class="ex-steplist__desc">녹음된 음성 안내를 재생합니다. "대기자가 3명입니다. 잠시만 기다려 주세요." 같은 안내가 여기서 흘러나옵니다.</p>
        </div>
      </div>
      <div class="ex-steplist__item">
        <div class="ex-steplist__num">02</div>
        <div>
          <p class="ex-steplist__title">시나리오 분기</p>
          <p class="ex-steplist__desc">고객 입력(DTMF 버튼 또는 음성)에 따라 다음 메뉴로 이동합니다. 복잡한 트리 구조로 설계할 수 있고, 이 시나리오 설계가 곧 상담 경험의 90%를 좌우합니다.</p>
        </div>
      </div>
      <div class="ex-steplist__item">
        <div class="ex-steplist__num">03</div>
        <div>
          <p class="ex-steplist__title">기관계 연동</p>
          <p class="ex-steplist__desc">EAI/MCI 같은 미들웨어를 통해 핵심 업무 시스템을 조회합니다. ARS에서 "잔액 조회"가 가능한 이유가 바로 이것입니다.</p>
        </div>
      </div>
    </div>

    <h4 class="ex-h-sub">IVR ↔ 기관계 연동 구조</h4>
    <p class="ex-body">IVR이 고객 계약 정보를 조회하려면, 회사 내부의 핵심 업무 시스템(흔히 "기관계"라고 부릅니다)에 접근해야 합니다. 이 사이를 직접 연결하지 않고 <span class="ex-strong">EAI/MCI 미들웨어</span>를 경유하는 것이 일반적입니다. 각자 다른 시스템과 개별 인터페이스를 만드는 대신, 한 곳의 미들웨어를 표준으로 두는 것이죠.</p>

    <div class="ex-chain" style="margin: 24px 0;">
      <div class="ex-chain__node">IVR</div>
      <div class="ex-chain__arrow">&harr;</div>
      <div class="ex-chain__node ex-chain__node--dark">EAI/MCI<br/><span style="font-weight:400; font-size:12px; color:#a1a1a6;">(미들웨어)</span></div>
      <div class="ex-chain__arrow">&harr;</div>
      <div class="ex-chain__node">핵심계정계 · 보험계약계 · CRM</div>
    </div>
  </section>

  <!-- SECTION 8: 상담원 환경 & 녹취 -->
  <section class="ex-section ex-section--white">
    <p class="ex-eyebrow">Chapter 8 · 상담원 환경 &amp; 녹취</p>
    <h3 class="ex-h-section">상담원의 책상 위에는 더 이상 전화기가 없습니다.</h3>

    <p class="ex-body">옛날 콜센터 사진을 보면 상담원 책상마다 시커먼 전화기가 한 대씩 놓여 있었습니다. 요즘은 다릅니다. 책상 위에는 PC와 헤드셋만 있고, 그 PC 안에 전화기가 들어 있습니다. 이 변화의 이름이 <span class="ex-strong">Softphone</span>입니다. 그리고 그 옆에서 모든 통화를 자동으로 녹음하는 또 다른 시스템이 함께 돌아가고 있습니다.</p>

    <div class="ex-grid-2" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">상담원 업무 환경</p>
        <h4 class="ex-h-card">PC + 헤드셋이 곧 전화기</h4>
        <p class="ex-caption" style="margin-top: 12px;"><span class="ex-strong" style="color:#1d1d1f;">Softphone</span> &mdash; 물리적 전화기 없이 PC로 통화합니다. 헤드셋과 소프트웨어가 그 자리를 대신하면서, 설치와 유지보수 비용이 크게 줄었습니다.</p>
        <p class="ex-caption" style="margin-top: 16px;"><span class="ex-strong" style="color:#1d1d1f;">상담 AP + 스크린 팝업</span> &mdash; CTI 이벤트가 들어오는 순간, 상담 화면에 고객 정보가 자동으로 뜹니다. 상담원이 묻기 전에 이미 모든 것을 알고 있는 상태로 통화가 시작됩니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">녹취 시스템</p>
        <h4 class="ex-h-card">모든 통화는 자동으로 기록됩니다</h4>
        <p class="ex-caption" style="margin-top: 12px;"><span class="ex-strong" style="color:#1d1d1f;">CTI 이벤트 기반 녹취</span> &mdash; 통화 시작·종료 이벤트를 CTI에서 받아옵니다. 상담원이 별도로 "녹음 시작" 버튼을 누르지 않아도 모든 통화가 자동 기록됩니다.</p>

  <!-- HERO -->
  <section class="ex-section ex-section--light" style="padding-top: clamp(72px, 10vw, 140px); padding-bottom: clamp(56px, 7vw, 96px); text-align: left;">
    <p class="ex-eyebrow">IPCC 심화 교육 · 2차</p>
    <h2 class="ex-h-hero">그 다음,<br/>더 깊은 이야기.</h2>
    <p class="ex-lead" style="max-width: 620px;">PDS 아웃바운드, 옴니채널, SBC·미디어 게이트웨이, 벤더 현황, 그리고 견적 구성까지.<br/>현장에서 실제로 맞닥뜨리는 심화 주제를 하나씩 풀어 봅니다.</p>

  <!-- SECTION 0: 들어가며 -->
  <section class="ex-section ex-section--white">
    <p class="ex-eyebrow">들어가며</p>
    <h3 class="ex-h-section">왜 심화 교육이 필요한가요?</h3>

    <p class="ex-body">1차 교육에서는 IPCC를 이루는 다섯 개 핵심 시스템 — PBX, CTI, IVR, 녹취, 상담AP — 를 살펴봤습니다. 각자의 역할이 어떻게 맞물리는지, 고객의 전화 한 통이 상담사의 헤드셋까지 도달하기 위해 얼마나 많은 장비를 거쳐가는지 배웠습니다.</p>

    <p class="ex-body">하지만 영업 현장이나 기술 미팅에 들어가 보면, 실제로 대화가 시작되는 지점은 그 다음부터입니다. <span class="ex-strong">"아웃바운드는 어떻게 합니까?"</span>, <span class="ex-strong">"카카오톡 상담도 통합이 되나요?"</span>, <span class="ex-strong">"AI 콜봇을 연동하려면 뭐가 필요하죠?"</span>, <span class="ex-strong">"경쟁사 견적과 비교해 봤는데 왜 가격이 이렇게 차이나죠?"</span> — 이런 질문들입니다.</p>

    <p class="ex-pullquote">"IPCC를 안다는 것은, 구조를 아는 것에 그치지 않고 견적 한 줄의 의미까지 읽어낼 수 있다는 것이다."</p>

    <p class="ex-body ex-body--muted">이 글은 그 "다음 단계"를 위한 것입니다. PDS의 세 가지 발신 모드, 옴니채널과 멀티채널의 진짜 차이, SBC와 미디어 게이트웨이가 AI 콜봇 연동에서 왜 핵심인지, 국내 주요 벤더가 어떤 포지션을 차지하고 있는지, 그리고 견적을 짤 때 어떤 유형으로 접근해야 하는지를 차례로 풀어 봅니다.</p>
  </section>

  <!-- SECTION 1: 기본 구성 복습 -->
  <section class="ex-section ex-section--light">
    <p class="ex-eyebrow">Chapter 1 · 복습</p>
    <h3 class="ex-h-section">심화로 들어가기 전에 — 한 번 더 짚고 갑니다.</h3>

    <p class="ex-body">복습은 지루할 수 있지만, 심화는 기본 위에 쌓입니다. IPCC는 단순한 전화 교환 장비가 아니라, <span class="ex-strong">다섯 개의 핵심 시스템이 유기적으로 연동</span>되어 작동하는 지능형 컨택센터입니다. 한 통의 고객 전화가 상담사와 연결되기까지 이 다섯 시스템이 모두 참여합니다.</p>

    <div class="ex-grid-3" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">01 · 교환기</p>
        <h4 class="ex-h-card">PBX</h4>
        <p class="ex-caption" style="margin-top: 12px;">전화를 물리적으로 연결하는 교환기. 모든 내선과 대표번호를 관리합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">02 · 미들웨어</p>
        <h4 class="ex-h-card">CTI</h4>
        <p class="ex-caption" style="margin-top: 12px;">전화와 컴퓨터를 연결하는 두뇌. 라우팅 지시와 통계 생성을 담당합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">03 · 음성응답</p>
        <h4 class="ex-h-card">IVR</h4>
        <p class="ex-caption" style="margin-top: 12px;">고객을 처음 맞이하는 자동응답. 고객 정보를 조회하고 시나리오로 분기합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">04 · 음성 저장</p>
        <h4 class="ex-h-card">녹취</h4>
        <p class="ex-caption" style="margin-top: 12px;">상담 통화를 녹음해 저장. 법적 근거와 품질 관리의 토대입니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">05 · 상담 화면</p>
        <h4 class="ex-h-card">상담AP</h4>
        <p class="ex-caption" style="margin-top: 12px;">상담사가 실제로 쓰는 화면. 고객 정보와 이력이 모이는 창구입니다.</p>
      </div>
      <div class="ex-card" style="background: #1d1d1f; color: #f5f5f7;">
        <p class="ex-eyebrow" style="color: #86868b;">콜 흐름</p>
        <h4 class="ex-h-card" style="color: #f5f5f7;">유기적 연동</h4>
        <p class="ex-caption" style="margin-top: 12px; color: #a1a1a6;">고객 → PSTN → E1/PRI → VoIP GW → PBX → CTI → IVR → 상담석 → 녹취/통계</p>
      </div>
    </div>

    <div class="ex-callout">
      <p class="ex-callout__label">쉽게 비유하면</p>
      <p class="ex-callout__text">PBX가 <span class="ex-strong">도로와 차선</span>이라면, CTI는 <span class="ex-strong">신호등과 내비게이션</span>입니다. IVR은 <span class="ex-strong">입구의 안내데스크</span>, 녹취는 <span class="ex-strong">블랙박스</span>, 상담AP는 <span class="ex-strong">상담사의 대시보드</span>입니다. 하나만 빠져도 IPCC가 아닙니다.</p>
    </div>
  </section>

  <!-- SECTION 2: PBX 자원 -->
  <section class="ex-section ex-section--white">
    <p class="ex-eyebrow">Chapter 2 · PBX 자원</p>
    <h3 class="ex-h-section">PBX 안에는 네 가지 자원이 삽니다.</h3>

    <p class="ex-body">PBX는 전화를 연결하는 장비입니다. 그런데 그 안을 열어 보면, 여러 종류의 <span class="ex-strong">자원(Resource)</span>이 있습니다. 마치 건물의 층수·호수처럼 각 번호가 역할별로 나뉘어 있습니다. 견적을 짤 때 "상담석 100석"이라는 한 줄 뒤에는, 사실 이 네 가지 자원이 모두 얽혀 있습니다.</p>

    <div class="ex-grid-2" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">01 · 대표번호 (Q, Queue)</p>
        <h4 class="ex-h-card">고객이 거는 그 번호.</h4>
        <p class="ex-caption" style="margin-top: 12px;">1588-XXXX 같은 대표 번호입니다. PBX 안에서는 "큐(Queue)"로 부릅니다. 벤더마다 이름이 다른데, 어바이어는 <span class="ex-strong">VDN</span>, 시스코는 <span class="ex-strong">CDN</span>, 제네시스는 <span class="ex-strong">라우팅 포인트</span>라고 부릅니다. 용어는 다르지만 같은 개념입니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">02 · 내선번호</p>
        <h4 class="ex-h-card">상담사 자리마다 하나씩.</h4>
        <p class="ex-caption" style="margin-top: 12px;">1001, 1002, 1003… 이렇게 순차적으로 부여됩니다. 100석 규모라면 내선 1001~1100, 총 100개가 필요합니다. 내선 개수가 곧 상담석 개수입니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">03 · IVR 포트</p>
        <h4 class="ex-h-card">안내음이 쓰는 논리적 내선.</h4>
        <p class="ex-caption" style="margin-top: 12px;">IVR 시스템에 연결되는 포트로, 고객이 안내음을 듣는 동안 이 자원을 점유합니다. 예를 들어 IVR 포트 2001~2100, 총 100채널을 설정해 둡니다. 동시에 몇 명의 고객이 IVR을 듣고 있을 수 있느냐가 여기서 결정됩니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">04 · 스킬 그룹</p>
        <h4 class="ex-h-card">상담사 묶음.</h4>
        <p class="ex-caption" style="margin-top: 12px;">"보험 문의" 전담 그룹, "VIP 고객" 전담 그룹처럼 능력·업무별로 상담사를 묶습니다. CTI는 이 스킬 그룹 정보를 보고 최적의 상담사에게 콜을 연결합니다.</p>
      </div>
    </div>
  </section>

  <!-- SECTION 3: CTI 두뇌 (DARK) -->
  <section class="ex-section ex-section--dark">
    <p class="ex-eyebrow">Chapter 3 · CTI</p>
    <h3 class="ex-h-section">CTI가 없으면, IPCC가 아닙니다.</h3>
    <p class="ex-lead" style="max-width: 720px;">CTI(Computer Telephony Integration)는 전화(Telephony)와 컴퓨터(Computer)를 통합(Integration)하는 미들웨어입니다. 이 한 겹이 있어야 비로소 "지능형" 컨택센터가 됩니다.</p>

    <p class="ex-body" style="margin-top: 40px;">CTI는 마치 숨 쉬듯 다섯 가지 일을 동시에 합니다. 레지스터, 이벤트 감지, 데이터 변환, 라우팅 지시, 통계 생성. 하나씩 풀어 보겠습니다.</p>

    <h4 class="ex-h-sub" style="margin-top: 48px;">1. 레지스터 — DN 모니터링</h4>
    <p class="ex-body">PBX의 모든 내선번호(DN, Directory Number)를 CTI에 등록합니다. 그 순간부터 CTI는 <span class="ex-strong">24시간 그 번호들의 상태를 감시</span>합니다. 상담사가 전화를 받았는지, 통화 중인지, 자리를 비웠는지 — 실시간으로 파악합니다.</p>

    <h4 class="ex-h-sub">2. 이벤트 감지</h4>
    <p class="ex-body">콜 인입, 전화 받음, 전화 끊김, 대기, 보류, 전환 — 이 모든 이벤트를 실시간으로 감지합니다. 마치 CCTV처럼, 통화를 둘러싼 어떤 움직임도 놓치지 않습니다.</p>

    <h4 class="ex-h-sub">3. 데이터 생성 — 16진수를 사람이 읽는 데이터로</h4>
    <p class="ex-body">PBX가 보내는 신호는 <span class="ex-strong">0x1A2B3C…</span> 같은 16진수(HEX) 덩어리입니다. 기계끼리 주고받는 언어입니다. CTI는 이것을 사람이 이해할 수 있는 형태로 변환합니다. "발신번호: 010-1234-5678, 수신시각: 14:23:01" — 이렇게요. CTI가 통역사 역할을 한다고 보면 됩니다.</p>

    <h4 class="ex-h-sub">4. 라우팅 지시</h4>
    <p class="ex-body">IVR에서 고객 정보를 받으면, CTI가 "이 콜은 어느 상담사에게 연결할지" PBX에게 지시합니다. VIP 고객은 VIP 전담 팀으로, 기술 문의는 기술팀으로. 이것이 <span class="ex-strong">지능형 라우팅</span>의 정체입니다.</p>

    <h4 class="ex-h-sub">5. 통계 생성</h4>
    <p class="ex-body">모든 이벤트 로그를 기반으로 호통계, 상담사 퍼포먼스, 큐 대기시간 같은 각종 통계를 생성합니다. 관리자 대시보드가 실시간으로 돌아가는 것도 CTI가 뒤에서 일하고 있기 때문입니다.</p>

    <p class="ex-pullquote">"CTI는 전화를 대신 거는 것이 아니라, 전화에 의미를 입히는 시스템이다."</p>
  </section>

  <!-- SECTION 4: IVR -->
  <section class="ex-section ex-section--light">
    <p class="ex-eyebrow">Chapter 4 · IVR</p>
    <h3 class="ex-h-section">IVR은 단순한 안내음이 아닙니다.</h3>

    <p class="ex-body">IVR(Interactive Voice Response)은 고객이 상담사와 연결되기 전에 만나는 자동응답 시스템입니다. 많은 분들이 IVR을 "안내 멘트 틀어주는 장치"로만 생각하지만, 실제로는 <span class="ex-strong">고객 정보를 조회하고 분류하는 중요한 관문</span>입니다.</p>

    <div class="ex-grid-3" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">역할 01</p>
        <h4 class="ex-h-card">멘트 플레이</h4>
        <p class="ex-caption" style="margin-top: 12px;">"안녕하십니까, ○○사입니다." 미리 녹음된 음성을 재생합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">역할 02</p>
        <h4 class="ex-h-card">시나리오 분기</h4>
        <p class="ex-caption" style="margin-top: 12px;">고객이 누른 번호(DTMF)에 따라 분기합니다. "1번 일반 문의, 2번 결제 문의…"</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">역할 03</p>
        <h4 class="ex-h-card">기관계 연동</h4>
        <p class="ex-caption" style="margin-top: 12px;">전화번호로 고객 정보를 조회합니다. VIP 여부, 계좌 잔액 등 실시간 확인.</p>
      </div>
    </div>

    <h4 class="ex-h-sub" style="margin-top: 48px;">기관계 연동 방식의 변화</h4>
    <p class="ex-body">IVR이 고객 정보를 조회하려면, 기업 내부의 기관계 시스템과 통신해야 합니다. 이 통신 방식이 최근 몇 년 사이 크게 바뀌었습니다.</p>

    <table class="ex-table">
      <thead>
        <tr>
          <th>시기</th>
          <th>방식</th>
          <th>특징</th>
          <th>예시</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="ex-strong">과거</span></td>
          <td><span class="ex-tag">TCP/IP 소켓</span></td>
          <td>고정된 형식의 "전문(電文)"을 주고받음. 한 번 설정하면 바꾸기 어렵고 유지보수가 복잡.</td>
          <td>0010HONG001234567890100000…</td>
        </tr>
        <tr>
          <td><span class="ex-strong">현재</span></td>
          <td><span class="ex-tag ex-tag--primary">REST API (JSON)</span></td>
          <td>표준화된 HTTP API 방식. 읽기 쉽고 개발·연동이 훨씬 간편.</td>
          <td>{"customer": "홍길동", "grade": "VIP"}</td>
        </tr>
      </tbody>
    </table>

    <p class="ex-body" style="margin-top: 24px;">겉보기에는 포맷만 바뀐 것 같지만, 실무에서는 <span class="ex-strong">개발 리드타임이 크게 줄고 장애 디버깅이 쉬워졌다</span>는 의미입니다. 최근 구축되는 IVR은 거의 전부 REST API 기반입니다.</p>
  </section>

  <!-- SECTION 5: 녹취 -->
  <section class="ex-section ex-section--white">
    <p class="ex-eyebrow">Chapter 5 · 녹취</p>
    <h3 class="ex-h-section">녹취는 어떻게 음성을 잡아낼까요?</h3>

    <p class="ex-body">녹취 시스템은 상담 통화를 녹음해 저장합니다. 법적 근거 확보, 품질 관리(QA), 고객과의 분쟁 해결에 필수입니다. 그런데 여기서 한 가지 궁금증이 생깁니다. <span class="ex-strong">"통화 중인 음성을, 어떻게 원본을 건드리지 않고 복사할 수 있을까?"</span></p>

    <div class="ex-callout">
      <p class="ex-callout__label">미러 포트(Mirror Port)란?</p>
      <p class="ex-callout__text">네트워크 스위치에는 특정 포트의 트래픽을 다른 포트로 <span class="ex-strong">복제(미러링)</span>하는 기능이 있습니다. 녹취 서버는 이 미러 포트에 연결해 음성 패킷(RTP)을 수신합니다. 원본 통화를 방해하지 않고 조용히 복사하는 방식입니다.</p>
    </div>

    <h4 class="ex-h-sub" style="margin-top: 40px;">녹취가 일어나는 순서</h4>
    <p class="ex-body">상담사가 콜을 받으면, 녹취 시스템은 다섯 단계를 거쳐 음성 파일을 완성합니다.</p>

    <div class="ex-pipeline" style="grid-template-columns: 1fr auto 1fr auto 1fr; margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-step__num">Step 01</p>
        <h4 class="ex-h-card">CTI 이벤트 수신</h4>
        <p class="ex-caption" style="margin-top: 12px;">콜 시작·종료 이벤트를 CTI로부터 받아 녹취 시작·종료를 제어합니다.</p>
      </div>
      <div class="ex-pipeline__arrow">→</div>
      <div class="ex-card">
        <p class="ex-step__num">Step 02</p>
        <h4 class="ex-h-card">녹취 시작 판단</h4>
        <p class="ex-caption" style="margin-top: 12px;">어떤 콜을, 언제부터 녹음할지 룰에 따라 결정합니다.</p>
      </div>
      <div class="ex-pipeline__arrow">→</div>
      <div class="ex-card">
        <p class="ex-step__num">Step 03</p>
        <h4 class="ex-h-card">RTP 패킷 캡처</h4>
        <p class="ex-caption" style="margin-top: 12px;">스위치 미러포트에서 음성 데이터(RTP 스트림)를 복제해 가져옵니다.</p>
      </div>
    </div>
    <div class="ex-pipeline" style="grid-template-columns: 1fr auto 1fr; margin-top: 20px;">
      <div class="ex-card">
        <p class="ex-step__num">Step 04</p>
        <h4 class="ex-h-card">CTI 데이터 매핑</h4>
        <p class="ex-caption" style="margin-top: 12px;">전화번호, 상담사 ID, 시각 같은 메타데이터를 음성 파일에 결합합니다.</p>
      </div>
      <div class="ex-pipeline__arrow">→</div>
      <div class="ex-card" style="background: #1d1d1f; color: #f5f5f7;">
        <p class="ex-step__num" style="color: #86868b;">Step 05</p>
        <h4 class="ex-h-card" style="color: #f5f5f7;">녹취 파일 저장</h4>
        <p class="ex-caption" style="margin-top: 12px; color: #a1a1a6;">고객·상담사 화자를 분리한 스테레오로 저장 — AICC 연동의 핵심.</p>
      </div>
    </div>

    <div class="ex-callout">
      <p class="ex-callout__label">한 가지 더</p>
      <p class="ex-callout__text">AICC나 AI 분석을 하려면 <span class="ex-strong">반드시 스테레오(2채널) 저장</span>이 필요합니다. 고객 음성과 상담사 음성이 한 채널에 섞여 있으면 "누가 말했는지" 구분할 수 없어, STT 정확도와 분석 품질이 크게 떨어지기 때문입니다.</p>
    </div>
  </section>

  <!-- SECTION 6: 통계 -->
  <section class="ex-section ex-section--light">
    <p class="ex-eyebrow">Chapter 6 · 통계 체계</p>
    <h3 class="ex-h-section">콜센터의 성적표는 네 가지로 나뉩니다.</h3>

    <p class="ex-body">IPCC가 쏟아내는 데이터는 어마어마합니다. 그 데이터가 정리되어 나오는 리포트가 바로 통계인데, 콜센터 운영의 나침반 역할을 합니다. 크게 네 가지 종류가 있습니다.</p>

    <div class="ex-grid-2" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">01 · 호통계</p>
        <h4 class="ex-h-card">콜과 디지털 채널 전체.</h4>
        <p class="ex-caption" style="margin-top: 12px;">총 인입 수, 처리 수, 포기 수, 평균 대기 시간(ASA) 등. 채널을 가리지 않고 전체 인입 현황을 보여주는 가장 큰 틀입니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">02 · 상담사 통계</p>
        <h4 class="ex-h-card">개인별 퍼포먼스.</h4>
        <p class="ex-caption" style="margin-top: 12px;">처리 건수, 평균 통화 시간(AHT), 상태값(통화중·대기·이석) 이력. 운영자는 이 지표로 KPI를 관리합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">03 · 시간별 통계</p>
        <h4 class="ex-h-card">15분, 30분, 일, 주, 월, 연.</h4>
        <p class="ex-caption" style="margin-top: 12px;">"오전 10~11시가 피크타임" 같은 패턴 분석에 쓰입니다. 인력 배치와 스케줄링의 기초 자료입니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">04 · 상담 이력</p>
        <h4 class="ex-h-card">실제 상담 내용 기반.</h4>
        <p class="ex-caption" style="margin-top: 12px;">호통계보다 더 정확합니다. 고객이 어떤 문의를 했고 어떻게 처리됐는지까지 추적 가능한, 질적 분석의 핵심입니다.</p>
      </div>
    </div>

    <div class="ex-callout">
      <p class="ex-callout__label">통합통계란?</p>
      <p class="ex-callout__text">인프라 통계(CTI) + 상담 이력(상담AP) + 녹취(파일 경로) — 이 세 가지를 연동해 하나의 화면에서 함께 보여주는 고급 기능입니다. <span class="ex-strong">대형 센터일수록 이 통합 뷰가 운영 품질을 결정</span>합니다. "이 콜의 녹취를 듣고 싶다"에서 클릭 한 번에 모든 맥락이 따라오도록 만드는 기능이지요.</p>
    </div>
  </section>

  <!-- SECTION 7: PDS (DARK) -->
  <section class="ex-section ex-section--dark">
    <p class="ex-eyebrow">Chapter 7 · PDS</p>
    <h3 class="ex-h-section">고객이 먼저 거는 것이 아니라, 우리가 겁니다.</h3>
    <p class="ex-lead" style="max-width: 720px;">PDS(Predictive Dialing System)는 시스템이 자동으로 고객에게 먼저 전화를 거는 솔루션입니다. 상담사가 수동으로 걸지 않고, 리스트만 올려두면 PDS가 발신 타이밍을 잡아 냅니다.</p>

    <h4 class="ex-h-sub" style="margin-top: 48px;">언제 쓰일까요?</h4>
    <p class="ex-body">가장 흔한 쓰임새는 네 가지입니다. <span class="ex-strong">해피콜</span>(AS 완료 후 만족도 조사), <span class="ex-strong">서베이</span>(여론조사), <span class="ex-strong">알림</span>(연체 안내, 이벤트 공지), 그리고 <span class="ex-strong">텔레마케팅 캠페인</span>입니다. 업종마다 쓰는 맥락이 조금씩 다르지만, "우리가 먼저 연락해야 하는 상황"이라면 거의 다 PDS 영역입니다.</p>

    <h4 class="ex-h-sub">발신 모드 세 가지</h4>
    <p class="ex-body">PDS의 진짜 개성은 "어떻게 거느냐"에 있습니다. 세 가지 모드가 있고, 각각 성격이 뚜렷합니다.</p>

    <div class="ex-grid-3" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-step__num" style="color: #86868b;">Mode 01</p>
        <h4 class="ex-h-card" style="color: #f5f5f7;">Preview</h4>
        <p class="ex-caption" style="margin-top: 12px; color: #a1a1a6;">수동 클릭 방식. 상담사가 고객 정보를 <span style="color: #f5f5f7; font-weight: 600;">미리 확인</span>한 뒤 직접 발신 버튼을 누릅니다. 민감 고객·중요 고객 관리에 적합합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-step__num" style="color: #86868b;">Mode 02</p>
        <h4 class="ex-h-card" style="color: #f5f5f7;">Progressive</h4>
        <p class="ex-caption" style="margin-top: 12px; color: #a1a1a6;">가용 자원 맞춤. 응대 가능한 상담사 수만큼만 발신하는 <span style="color: #f5f5f7; font-weight: 600;">1:1 방식</span>. 안정적이고 포기율이 낮습니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-step__num" style="color: #86868b;">Mode 03</p>
        <h4 class="ex-h-card" style="color: #f5f5f7;">Predictive</h4>
        <p class="ex-caption" style="margin-top: 12px; color: #a1a1a6;">알고리즘 예측. 가용 자원보다 <span style="color: #f5f5f7; font-weight: 600;">초과 발신</span>(예: 120%). 일부 고객이 안 받거나 끊는 것을 예측해 더 많이 겁니다. 고속 소진에 유리합니다.</p>
      </div>
    </div>

    <h4 class="ex-h-sub" style="margin-top: 56px;">PDS 3대 구성요소</h4>
    <p class="ex-body">PDS는 크게 세 덩어리로 이루어져 있습니다. 셋 다 반드시 있어야 PDS라고 부를 수 있습니다.</p>

    <ul class="ex-list">
      <li><span class="ex-strong">콜링 리스트</span> — 발신 대상 고객 DB. 이름, 전화번호, 발신 허용 여부 등이 담긴 엑셀·DB 파일을 업로드합니다.</li>
      <li><span class="ex-strong">캠페인</span> — 발신 모드, 발신 시간대, 재시도(리트라이) 횟수와 간격 등을 설정하는 규칙 집합입니다.</li>
      <li><span class="ex-strong">관리 모듈</span> — 캠페인을 실행·중지하고, 실시간 현황을 모니터링하며, 결과 통계를 조회하는 관리자 화면입니다.</li>
    </ul>

    <div class="ex-callout">
      <p class="ex-callout__label">국내 PDS 시장 현황</p>
      <p class="ex-callout__text">주요 플레이어들이 대부분 철수하고, 현재는 <span class="ex-strong">샌드박스가 독과점 구조로 시장을 장악</span>하고 있습니다. 신규 구축이든 증설이든, 아웃바운드가 포함된 견적은 샌드박스를 먼저 떠올리는 것이 현장 감각입니다.</p>
    </div>
  </section>

  <!-- SECTION 8: 옴니채널 -->
  <section class="ex-section ex-section--white">
    <p class="ex-eyebrow">Chapter 8 · 옴니채널</p>
    <h3 class="ex-h-section">채널은 많아졌는데, 정말 통합되어 있나요?</h3>

    <p class="ex-body">고객은 더 이상 전화만 쓰지 않습니다. 카카오톡, 채팅, 이메일, SNS, 앱 안의 문의 폼 — 들어오는 채널이 늘었습니다. 문제는 "이걸 운영하는 방식"입니다. 같은 여러 채널이라도 어떻게 엮느냐에 따라 <span class="ex-strong">멀티채널</span>과 <span class="ex-strong">옴니채널</span>로 완전히 다릅니다.</p>

    <div class="ex-grid-2" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">멀티채널</p>
        <h4 class="ex-h-card">채널은 여럿, 운영은 따로.</h4>
        <p class="ex-caption" style="margin-top: 12px;">전화는 시스코 시스템, 채팅은 채널톡, SNS는 별도 툴 — 데이터가 서로 연결되지 않습니다. 채널 간 고객 이력 공유 불가, "채팅하다가 전화로"라는 연속 서비스 불가. 다만 구축 난이도가 낮고 저렴합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">옴니채널</p>
        <h4 class="ex-h-card">채널은 여럿, 모두 하나로 연결.</h4>
        <p class="ex-caption" style="margin-top: 12px;">카카오톡으로 시작한 문의를 전화로 이어받을 때, 상담사 화면에 채팅 내용이 함께 보입니다. 채널 전환 시 이력이 연속되고, 통합 고객 뷰로 일관된 서비스 품질을 유지합니다. 단, 구축 난이도·비용이 매우 높습니다.</p>
      </div>
    </div>

    <h4 class="ex-h-sub" style="margin-top: 48px;">용어 정리 — 콜, 호, 인터랙션</h4>
    <p class="ex-body">옴니채널을 이야기하려면 단어부터 정리해야 합니다. 제안서에서 헷갈리기 쉬운 세 단어가 있습니다.</p>

    <table class="ex-table">
      <thead>
        <tr>
          <th>용어</th>
          <th>범위</th>
          <th>비고</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="ex-strong">콜</span></td>
          <td>보이스(전화)만 해당</td>
          <td>가장 좁은 개념. 옛날부터 쓰던 단어입니다.</td>
        </tr>
        <tr>
          <td><span class="ex-strong">호 (呼)</span></td>
          <td>보이스 + 디지털 채널 모두</td>
          <td>채팅, 이메일, SNS까지 아우르는 한국어 공식 용어입니다.</td>
        </tr>
        <tr>
          <td><span class="ex-strong">인터랙션</span></td>
          <td>"호"와 동일</td>
          <td>글로벌 표준 용어. Interaction Recording, Interaction Management 같은 제품명에 쓰입니다.</td>
        </tr>
      </tbody>
    </table>

    <p class="ex-pullquote">"제안서에는 '옴니채널 구축'이라고 써도, 실제 완전한 옴니채널을 구현한 사례는 국내에 거의 없다."</p>

    <p class="ex-body">채널 연동의 기술적 복잡도가 매우 높기 때문입니다. 고객 이력 하나를 모든 채널에서 실시간으로 맞추려면, 채널별 시스템의 데이터 구조부터 통일해야 합니다. 대부분의 "옴니채널 프로젝트"는 사실 <span class="ex-strong">멀티채널 + 일부 연동</span>에 가깝습니다. 영업 단계에서는 이 현실을 감안하고 고객사의 눈높이를 맞춰 가는 것이 중요합니다.</p>
  </section>

  <!-- SECTION 9: SBC / 미디어 게이트웨이 (DARK) -->
  <section class="ex-section ex-section--dark">
    <p class="ex-eyebrow">Chapter 9 · SBC · 미디어 게이트웨이</p>

  <!-- 들어가며 -->
  <section class="ex-section ex-section--white">

    <h3 class="ex-h-section">왜 콜센터의 역사를 알아야 할까요?</h3>

    <p class="ex-body">"AICC가 핫하다"는 말은 누구나 들어 봤을 겁니다. 그런데 막상 현장에 가 보면 여전히 20년 된 어바이어 장비가 돌아가고, 어떤 곳은 이미 클라우드로 다 넘어갔고, 또 어떤 곳은 그 중간 어딘가에 있습니다. <span class="ex-strong">왜 이렇게 회사마다 환경이 다른지</span>를 이해하려면 콜센터가 어떻게 진화해 왔는지부터 알아야 합니다.</p>

    <p class="ex-body">콜센터는 단순한 전화 교환기에서 출발해, 컴퓨터와 연결되고, 인터넷으로 옮겨 가고, 이제는 AI가 옴니채널을 처리하는 플랫폼이 되었습니다. <span class="ex-strong">각 단계마다 주류 벤더가 바뀌었고, 그 흔적이 지금 시장에 그대로 남아 있습니다.</span> 어바이어가 왜 무너졌는지, 제네시스가 왜 클라우드로 갈아타려 하는지, 시스코가 왜 갑자기 강해졌는지 — 모두 이 흐름 위에서 설명됩니다.</p>

    <p class="ex-pullquote">"지금 시장의 모든 트렌드는, 30년 전 키폰에서 시작된 흐름의 연속이다."</p>

    <p class="ex-body ex-body--muted">이 글에서는 콜센터 발전사부터 어플라이언스 vs 범용 장비, 가상화의 의미, IPCC를 구성하는 7가지 요소, 벤더별 현황, 그리고 지금 시장을 이끄는 핵심 트렌드까지 순서대로 정리합니다.</p>

  <!-- Chapter 1: 발전사 -->
  <section class="ex-section ex-section--light">
    <p class="ex-eyebrow">Chapter 1 · 발전사</p>
    <h3 class="ex-h-section">콜센터는 어떻게 진화해 왔을까요?</h3>

    <p class="ex-body">콜센터의 역사는 크게 다섯 단계로 나눌 수 있습니다. 핵심은 <span class="ex-strong">"전화만 연결" → "전화 + 데이터" → "전화 + 데이터 + AI"</span>로 점점 더 많은 것을 연계하는 방향으로 발전해 왔다는 점입니다.</p>

    <div class="ex-timeline">
      <div class="ex-timeline__item">
        <div class="ex-timeline__dot"></div>
        <p class="ex-timeline__year">1980 ~ 90년대</p>
        <h4 class="ex-timeline__title">키폰(Key Phone) 시대</h4>
        <p class="ex-timeline__body">버튼식 전화기로 상담원이 직접 전화를 받아 처리하던 시절입니다. 모든 것이 수동이었고, 연결이 끊기면 기록도 함께 사라졌습니다. 통화 내용은 종이 메모로 남기는 것이 전부였습니다.</p>
      </div>
      <div class="ex-timeline__item">
        <div class="ex-timeline__dot"></div>
        <p class="ex-timeline__year">1990년대 후반</p>
        <h4 class="ex-timeline__title">IVR · ARS 도입</h4>
        <p class="ex-timeline__body">"잔액 조회는 1번, 분실 신고는 2번"으로 익숙한 자동응답 시스템(IVR, Interactive Voice Response)이 등장합니다. 단순 업무를 기계가 대신 처리하기 시작한 첫 단계입니다. 상담원의 업무 부담이 처음으로 줄어든 시점이기도 합니다.</p>
      </div>
      <div class="ex-timeline__item">
        <div class="ex-timeline__dot"></div>
        <p class="ex-timeline__year">2000년대 초반</p>
        <h4 class="ex-timeline__title">상담 AP + CTI 통합</h4>
        <p class="ex-timeline__body">이때부터 전화와 컴퓨터가 손을 잡습니다. CTI(Computer Telephony Integration) 덕분에 고객이 전화하면 상담원 화면에 고객 정보가 자동으로 떠오르는 "팝업" 기능이 가능해졌습니다. 비로소 "데이터 기반 상담"이라는 개념이 자리 잡습니다.</p>
      </div>
      <div class="ex-timeline__item">
        <div class="ex-timeline__dot"></div>
        <p class="ex-timeline__year">2010년대</p>
        <h4 class="ex-timeline__title">SIP · IP 전환</h4>
        <p class="ex-timeline__body">아날로그 전화선(PSTN)에서 인터넷 기반 음성통화(VoIP / SIP)로 옮겨 갑니다. 전용 하드웨어 의존도가 떨어지고 운영 비용이 크게 줄어듭니다. 이 변화가 다음 단계인 클라우드 전환의 기반을 만듭니다.</p>
      </div>
      <div class="ex-timeline__item">
        <div class="ex-timeline__dot"></div>
        <p class="ex-timeline__year">2020년대 — 현재</p>
        <h4 class="ex-timeline__title">AI 옴니채널 AICC</h4>
        <p class="ex-timeline__body">전화 + 채팅 + SNS를 하나의 플랫폼에서 처리하는 시대가 옵니다. AI가 자동응답을 하고, 실시간으로 지식을 추천하고, 통화가 끝나면 요약까지 만들어 줍니다. 이것이 바로 <span class="ex-strong">AICC(AI Contact Center)</span>입니다.</p>
      </div>
    </div>

    <div class="ex-callout">
      <p class="ex-callout__label">한 줄 정리</p>
      <p class="ex-callout__text">콜센터의 역사는 결국 <span class="ex-strong">"사람 손이 하던 일을 기계가, 그다음엔 AI가 대신 처리하게 만든 과정"</span>입니다. 단계마다 주력 벤더와 핵심 기술이 바뀌었고, 그 흔적이 지금 시장에 그대로 남아 있습니다.</p>
    </div>
  </section>

  <!-- Chapter 2: 어플라이언스 vs 범용서버 -->
  <section class="ex-section ex-section--white">
    <p class="ex-eyebrow">Chapter 2 · 어플라이언스 vs 범용서버</p>
    <h3 class="ex-h-section">전용장비와 일반서버, 무엇이 다른가요?</h3>

    <p class="ex-body">콜센터 시스템을 구축할 때 가장 먼저 갈리는 선택지가 이것입니다. <span class="ex-strong">특정 제조사의 전용 하드웨어(어플라이언스)를 살 것이냐, 일반 x86 서버 위에 소프트웨어를 올릴 것이냐.</span> 이 선택이 향후 5~10년의 운영 비용과 확장성을 결정합니다.</p>

    <div class="ex-grid-2" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">방식 01</p>
        <h4 class="ex-h-card">어플라이언스 — 전용 하드웨어</h4>
        <p class="ex-caption" style="margin-top: 12px;">어바이어(Avaya), 시스코(Cisco)로 대표됩니다. 특정 제조사의 전용 장비에 전용 소프트웨어가 통째로 들어 있는 형태입니다. 한번 사면 같은 벤더 장비로만 교체·확장이 가능하고, 가격이 비싸며, 클라우드 전환에도 불리합니다. <span class="ex-strong">현재 추세는 시장 점유율 하락.</span></p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">방식 02</p>
        <h4 class="ex-h-card">범용서버 — 소프트웨어 기반</h4>
        <p class="ex-caption" style="margin-top: 12px;">브리지텍, 제네시스(Genesys)가 대표적입니다. 일반 x86 서버에 소프트웨어를 설치해 운영합니다. 비용이 효율적이고 확장이 유연하며, 클라우드 환경과도 자연스럽게 연동됩니다. 벤더 종속성도 낮습니다. <span class="ex-strong">시장의 대세.</span></p>
      </div>
    </div>

    <div class="ex-callout">
      <p class="ex-callout__label">쉽게 비유하면</p>
      <p class="ex-callout__text">어플라이언스는 <span class="ex-strong">"특정 브랜드 부품만 쓸 수 있는 전용 가전제품"</span>, 범용서버는 <span class="ex-strong">"일반 PC에 원하는 프로그램을 깔아서 쓰는 방식"</span>입니다. 처음엔 전용 가전이 안정적으로 보이지만, 부품이 단종되거나 회사가 흔들리면 답이 없습니다.</p>

    <p class="ex-pullquote">"어바이어의 파산은 우연이 아니라, 어플라이언스 모델의 한계를 보여 준 사건이었다."</p>

    <p class="ex-eyebrow">Chapter 3 · 가상화 시대</p>
    <h3 class="ex-h-section">서버 한 대에 여러 개의 가상 컴퓨터.</h3>
    <p class="ex-lead" style="max-width: 720px;">가상화(Virtualization)는 콜센터 인프라를 근본적으로 바꿨습니다. 같은 일을 더 적은 장비로, 더 적은 비용으로 처리할 수 있게 만든 기술입니다.</p>

    <p class="ex-body" style="margin-top: 56px;">예전에는 IVR 서버 한 대, CTI 서버 한 대, 녹취 서버 한 대처럼 <span class="ex-strong">기능마다 물리 서버를 따로 두는 것</span>이 당연했습니다. 그런데 한번 생각해 보면, 이 서버들은 평소에 5~10%밖에 안 쓰입니다. 비싼 장비를 사 놓고 대부분의 시간 동안 놀리고 있는 셈입니다.</p>

    <p class="ex-body">가상화는 이 낭비를 없애 줍니다. 고성능 서버 한 대에 <span class="ex-strong">VMware 같은 가상화 소프트웨어</span>를 깔면, 그 위에 여러 개의 "가상 머신(VM)"을 올릴 수 있습니다. 마치 한 대의 컴퓨터 안에 여러 대의 컴퓨터가 들어 있는 것처럼 동작합니다. 결과적으로 서버 대수가 줄고, 전기·공간·관리 비용이 동시에 절감됩니다.</p>

    <h4 class="ex-h-sub" style="margin-top: 56px;">가상화의 핵심 — 이미지(Image)</h4>
    <p class="ex-body">가상화의 진짜 강력한 점은 "복제"입니다. 서버 설정 전체를 <span class="ex-strong">파일 하나(이미지)</span>로 저장해 둘 수 있습니다. 새 서버가 필요할 때 이 이미지를 복사해서 바로 실행하면 끝입니다. 컴퓨터 백업본을 그대로 다른 장비에 올리는 것과 같은 개념입니다. 장애 대응도 빨라지고, 테스트 환경 구축도 단숨에 끝납니다.</p>

    <h4 class="ex-h-sub">가상화 vs 클라우드 — 어디가 다를까요?</h4>
    <p class="ex-body">자주 헷갈리는 부분입니다. 둘 다 "서버를 효율적으로 쓰는 기술"이지만 위치가 다릅니다. <span class="ex-strong">가상화는 우리 사무실(또는 데이터센터) 안에 서버를 두고 직접 운영</span>하는 온프레미스 방식이고, <span class="ex-strong">클라우드는 AWS·Azure 같은 외부 데이터센터를 빌려 쓰는</span> 방식입니다. 보안이 중요한 금융권은 데이터를 외부로 보내지 않으려고 가상화(온프레미스)를 선호하는 경우가 많습니다.</p>

    <div class="ex-callout">
      <p class="ex-callout__label">왜 이게 중요할까요?</p>
      <p class="ex-callout__text">가상화는 <span class="ex-strong">"클라우드로 가기 전 단계"</span>이기도 합니다. 일단 시스템을 가상 머신 형태로 만들어 두면, 나중에 그 이미지를 그대로 클라우드로 옮길 수 있습니다. 그래서 지금 가상화 위에서 잘 돌아가는 콜센터는 향후 클라우드 전환의 부담이 훨씬 적습니다.</p>
    </div>
  </section>

  <!-- Chapter 4: IPCC 7가지 구성요소 -->
  <section class="ex-section ex-section--light">
    <p class="ex-eyebrow">Chapter 4 · IPCC 구성요소</p>
    <h3 class="ex-h-section">IPCC를 이루는 7가지 핵심 요소.</h3>

    <p class="ex-body">IPCC(IP Contact Center)는 단일 제품이 아니라 <span class="ex-strong">여러 시스템이 유기적으로 연결된 복합 솔루션</span>입니다. 각 요소가 어떤 역할을 하는지 알면, 견적서나 제안서를 봤을 때 무엇을 빼고 더해야 할지가 보입니다.</p>

    <div class="ex-grid-3" style="margin-top: 32px;">
      <div class="ex-card">
        <p class="ex-eyebrow">01</p>
        <h4 class="ex-h-card">PBX — 교환기</h4>
        <p class="ex-caption" style="margin-top: 12px;">전화 연결을 담당하는 핵심 장비. 고객 전화를 받아 알맞은 상담원에게 연결해 주는 "전화 교환수" 역할을 합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">02</p>
        <h4 class="ex-h-card">CTI — 컴퓨터-전화 통합</h4>
        <p class="ex-caption" style="margin-top: 12px;">전화와 컴퓨터를 묶어 줍니다. 고객 전화가 들어오면 화면에 고객 정보가 자동으로 뜨고, 상담 데이터가 시스템 간에 오갑니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">03</p>
        <h4 class="ex-h-card">IVR — 자동응답</h4>
        <p class="ex-caption" style="margin-top: 12px;">"1번 누르세요" 방식의 자동 메뉴. 단순 문의를 자동으로 처리하고, 상담원 연결 전에 본인 인증과 사전 안내를 진행합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">04</p>
        <h4 class="ex-h-card">녹취 시스템</h4>
        <p class="ex-caption" style="margin-top: 12px;">통화 내용 전체를 저장합니다. 법적 분쟁 대비, 품질 관리, AI 분석(TA)의 원천 데이터로 쓰입니다. 금융권에서는 필수입니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">05</p>
        <h4 class="ex-h-card">상담 AP — 애플리케이션</h4>
        <p class="ex-caption" style="margin-top: 12px;">상담원이 실제 보고 쓰는 화면입니다. 고객 정보 조회, 상담 이력 기록, 업무 처리가 모두 여기서 일어납니다. <span class="ex-strong">수정 비용이 가장 큰 영역</span>이기도 합니다.</p>
      </div>
      <div class="ex-card">
        <p class="ex-eyebrow">06</p>
        <h4 class="ex-h-card">PDS — 자동발신</h4>
        <p class="ex-caption" style="margin-top: 12px;">아웃바운드(발신) 콜을 자동화합니다. 고객 목록을 정해진 순서대로 자동으로 발신해 마케팅·수납 업무에 활용됩니다.</p>
      </div>
    </div>

    <div class="ex-card" style="margin-top: 20px;">
      <p class="ex-eyebrow">07</p>
      <h4 class="ex-h-card">WFM — 인력 관리 시스템 (Workforce Management)</h4>
      <p class="ex-caption" style="margin-top: 12px;">콜 예측을 기반으로 필요한 상담원 수를 계산하고 스케줄을 자동 배분합니다. <span class="ex-strong">도입 비용이 억 단위</span>라 주로 대형 센터에서 쓰입니다. 중소 센터는 ROI 검토가 필수입니다.</p>
    </div>

    <h4 class="ex-h-sub" style="margin-top: 56px;">교환기(PBX)와 CTI, 무엇이 다를까요?</h4>
    <p class="ex-body">둘 다 "전화" 관련이라 헷갈리기 쉽지만 역할이 전혀 다릅니다. <span class="ex-strong">PBX는 전화 회선을 물리적으로 연결</span>하는 장비이고, <span class="ex-strong">CTI는 그 전화에 데이터를 얹어 지능적으로 처리</span>하는 소프트웨어입니다.</p>

  <!-- Chapter 6: 핵심 트렌드 -->
  <section class="ex-section ex-section--light">
    <p class="ex-eyebrow">Chapter 6 · 시장 트렌드</p>
    <h3 class="ex-h-section">지금 시장을 이끄는 세 가지 흐름.</h3>

    <p class="ex-body">벤더 지형이 바뀌면서 시장 전체의 흐름도 함께 바뀌고 있습니다. 지금 콜센터 업계에서 일어나는 변화는 결국 <span class="ex-strong">"통합 · 이전 · 연계"</span> 세 단어로 요약됩니다.</p>

    <h4 class="ex-h-sub" style="margin-top: 40px;">하나, 원벤더(One Vendor) 전략</h4>
    <p class="ex-body">예전에는 PBX는 어바이어, CTI는 A사, 녹취는 B사처럼 <span class="ex-strong">기능마다 다른 벤더 제품을 섞어 쓰는 멀티벤더 방식</span>이 일반적이었습니다. 지금은 한 벤더가 모든 것을 제공하는 원벤더 방식으로 바뀌고 있습니다. 유지보수 비용이 줄어들고, 장애가 났을 때 책임 소재가 명확해지기 때문입니다. 여러 회사를 동시에 부르고 서로 책임을 미루는 일이 사라집니다.</p>

    <h4 class="ex-h-sub">둘, 클라우드 전환</h4>
    <p class="ex-body">온프레미스 장비는 보통 <span class="ex-strong">5~7년 주기</span>로 교체합니다. 그 시점에 새 장비를 사는 대신 클라우드로 옮기는 결정을 하는 곳이 많아졌습니다. 초기 투자 비용이 줄고, 트래픽에 따라 탄력적으로 확장할 수 있기 때문입니다. 다만 금융권은 보안 규제 때문에 완전 클라우드는 어렵고, <span class="ex-strong">온프레미스와 병행하는 하이브리드</span>가 현실적입니다.</p>

    <h4 class="ex-h-sub">셋, 화자분리(RX / TX) 필수화</h4>
    <p class="ex-body">AICC 시대의 새로운 요구사항입니다. 통화 음성을 <span class="ex-strong">고객 측(RX)과 상담원 측(TX)으로 분리해서 녹음</span>하는 것이 표준이 되고 있습니다. AI가 누가 무슨 말을 했는지 정확히 분석해야 STT(음성→텍스트), 통화 요약, 감정 분석의 품질이 올라가기 때문입니다. 기존에 한 채널로만 녹음하던 곳은 AICC 도입 전에 화자분리부터 정비해야 합니다.</p>

    <div class="ex-callout">
      <p class="ex-callout__label">한 줄 정리</p>
      <p class="ex-callout__text"><span class="ex-strong">원벤더로 단순화하고, 클라우드로 옮기고, AI를 위해 화자분리부터 깔아 두는 것</span> — 지금 콜센터 IT 담당자들이 가장 많이 고민하는 세 가지 주제가 정확히 이 순서대로입니다.</p>
    </div>
  </section>

  <!-- Chapter 7: 비용 & 실무 팁 -->
  <section class="ex-section ex-section--white">
    <p class="ex-eyebrow">Chapter 7 · 비용 · 실무</p>
    <h3 class="ex-h-section">현장에서 꼭 알아야 할 숫자와 팁.</h3>

    <p class="ex-body">이론은 이쯤 하고, 실제로 일하면서 마주치는 숫자와 함정을 정리합니다. 견적을 검토하거나 제안을 받을 때 기준이 되는 정보입니다.</p>

    <div class="ex-grid-2" style="margin-top: 32px;">
      <div>
        <p class="ex-num">30~80<span style="font-size:0.4em; font-weight:500; color:#6e6e73;"> 만원/월</span></p>
        <p class="ex-caption">ASP 렌탈 방식 기준, 상담 1석당 월 비용. 100석 센터라면 월 3,000~8,000만원 수준입니다.</p>
      </div>
      <div>
        <p class="ex-num">억<span style="font-size:0.4em; font-weight:500; color:#6e6e73;"> 단위</span></p>
        <p class="ex-caption">WFM(인력관리 시스템) 도입 비용. 대형 센터에서나 ROI가 나오므로 중소 센터는 신중한 검토가 필요합니다.</p>
      </div>
    </div>

    <h4 class="ex-h-sub" style="margin-top: 56px;">실무에서 꼭 챙겨야 할 네 가지</h4>
    <ul class="ex-list">

    function showDetail(id) {
      const lecture = LECTURES.find(l => l.id === id);
      if (!lecture) return;

      document.getElementById('listView').classList.add('hidden');
      const detailView = document.getElementById('detailView');
      detailView.classList.add('active');

      document.getElementById('detailHeader').innerHTML = `
    <span class="detail-header__badge" style="background:${lecture.color};">${lecture.badge}</span>
    <h1 class="detail-header__title">${lecture.title}</h1>
    <p class="detail-header__subtitle">${lecture.subtitle}</p>
    <div style="display:flex; gap:20px; margin-top:16px; font-size:13px; color:#86868b;">
      <span style="display:flex; align-items:center; gap:4px;">
        <span class="material-symbols-outlined" style="font-size:16px;">calendar_today</span> ${lecture.date}
      </span>
      <span style="display:flex; align-items:center; gap:4px;">
        <span class="material-symbols-outlined" style="font-size:16px;">schedule</span> ${lecture.duration}
      </span>
      <span style="display:flex; align-items:center; gap:4px;">
        <span class="material-symbols-outlined" style="font-size:16px;">person</span> ${lecture.instructor}
      </span>
    </div>
  `;
      document.getElementById('detailContent').innerHTML = LECTURE_CONTENT[id] || '<p>콘텐츠 준비 중입니다.</p>';
      window.scrollTo(0, 0);
    }

    // ── Show List ──
    function showList() {
      document.getElementById('detailView').classList.remove('active');
      document.getElementById('listView').classList.remove('hidden');
    }

    renderCards();
