[pytest]
markers =
    slow: LLM 호출이 포함된 느린 테스트 (deselect with '-m "not slow"')
    smoke: 5초 내 끝나는 health/login 류 (가장 빠른 안전망)
    e2e: Playwright 브라우저 기반 사용자 여정 테스트
    journey: 실사용자 시나리오 (로그인→시뮬레이션→히스토리 같은 멀티스텝)

addopts =
    --strict-markers
    -ra
    --tb=short
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure
    --output=test-results
    --html=test-results/report.html
    --self-contained-html
    --ignore=tests/test_all_llm_endpoints.py

testpaths =
    tests
    test_api.py
    test_e2e.py

# 테스트 파일 검색 제한 — 루트의 script-style 파일들은 제외
python_files = test_*.py
python_classes = Test*
python_functions = test_*
